
networks:
  proxy:
    name: 'proxy-network'
    external: true
  mail:
    name: mail-network
    external: true
  database:
    name: 'database-network'
    external: true
  ai:
    name: 'ai-network'
    external: true

services:

  redis:
    image: redis:7-alpine
    container_name: mailflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mail
      - database
      - ai

  email-worker:
    build: .
    container_name: mailflow-email-worker
    restart: unless-stopped
    depends_on:
      - redis
    command: ["python", "-m", "app.main"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      STORAGE_ROOT: ${STORAGE_ROOT}
      MASTER_KEY: ${MASTER_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
    volumes:
      - mail_storage:/storage
    networks:
      - mail
      - database

  api-worker:
    build: .
    container_name: mailflow-api-worker
    restart: unless-stopped
    depends_on:
      - redis
    command: ["python", "-m", "app.api_worker"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      STORAGE_ROOT: ${STORAGE_ROOT}
      MASTER_KEY: ${MASTER_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
    volumes:
      - mail_storage:/storage
    networks:
      - mail
      - database
      - ai

  ai-worker:
    build: .
    container_name: mailflow-ai-worker
    restart: unless-stopped
    depends_on:
      - redis
    command: ["python", "-m", "app.ai_worker"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      STORAGE_ROOT: ${STORAGE_ROOT}
      MASTER_KEY: ${MASTER_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
    volumes:
      - mail_storage:/storage
    networks:
      - mail
      - database
      - ai

  dashboard:
    build: 
      context: .
      dockerfile: Dockerfile.dashboard  # Lembra-te de criar este ficheiro
    container_name: mailflow-dashboard
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - DASHBOARD_USER=${DASHBOARD_USER}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
      - LLM_MODEL=${LLM_MODEL}
      - MASTER_KEY=${MASTER_KEY}
    networks:
      - mail
      - database
      - proxy
    labels:
      - "traefik.enable=true"
      # Roteamento HTTP (Porta 80) -> Redireciona para HTTPS se tiveres isso no Traefik
      - "traefik.http.routers.mailflow-dash.rule=Host(`ai-mailflow-dashboard.appa8.com`)"
      - "traefik.http.routers.mailflow-dash.entrypoints=websecure"
      - "traefik.http.routers.mailflow-dash.tls=true"
      - "traefik.http.routers.mailflow-dash.tls.certresolver=letsencrypt" # O nome do teu resolver no Traefik
      # Porta interna do Streamlit
      - "traefik.http.services.mailflow-dash.loadbalancer.server.port=8501"


volumes:
  redis_data:
  mail_storage: